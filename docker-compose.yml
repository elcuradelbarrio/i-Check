version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:///./i_check.db
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      JWT_SECRET: your-secret-key-change-in-prod
    volumes:
      - ./backend:/app
    command: python main.py

  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
    depends_on:
      - backend
